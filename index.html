<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Empire v3.0 - Grand Expansion</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #cae5f5; font-family: sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #1a202c; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); pointer-events: none; z-index: 100; border-left: 5px solid #4a5568; }
        h1 { margin: 0; font-size: 18px; }
        #joystick-base { position: absolute; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.1); border: 2px solid rgba(0, 0, 0, 0.2); border-radius: 50%; display: none; transform: translate(-50%, -50%); pointer-events: none; z-index: 1000; }
        #joystick-stick { position: absolute; width: 50px; height: 50px; background: #fff; border-radius: 50%; top: 25px; left: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>帝国 v3.0 拡張計画</h1>
        <p style="font-size:12px;">中央：スカイツリー / 北側：国際空港 / 海沿い：高級邸宅<br>左スワイプ：移動 / 右スワイプ：視点変更</p>
    </div>

    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script>
        // --- 1. 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdcecf5);
        scene.fog = new THREE.FogExp2(0xdcecf5, 0.005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 3, 100); 
        let cameraRot = { x: 0, y: 0 };

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xfffdf0, 0.8);
        sun.position.set(100, 150, 100);
        scene.add(sun);

        // --- 2. 地面・道路の拡張 ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshPhongMaterial({ color: 0xcccccc }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 公園
        const park = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshPhongMaterial({ color: 0x76a065 }));
        park.rotation.x = -Math.PI / 2;
        park.position.set(0, 0.05, 0);
        scene.add(park);

        // --- 3. 東京スカイツリー構造 ---
        const skytree = new THREE.Group();
        const silver = new THREE.MeshPhongMaterial({ color: 0xbdc3c7 });

        // 足元（3脚状の補強材を簡易表現）
        for(let i=0; i<3; i++) {
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 2, 20, 8), silver);
            const a = (i * 2 * Math.PI) / 3;
            leg.position.set(Math.cos(a)*6, 10, Math.sin(a)*6);
            leg.rotation.z = (a === 0) ? -0.15 : 0.15;
            skytree.add(leg);
        }

        // メインタワー（下太め、上細め）
        const body = new THREE.Mesh(new THREE.CylinderGeometry(2, 6, 120, 16), silver);
        body.position.y = 60;
        skytree.add(body);

        // 第一展望台
        const obs1 = new THREE.Mesh(new THREE.CylinderGeometry(6, 4, 4, 16), new THREE.MeshPhongMaterial({color: 0xffffff}));
        obs1.position.y = 70;
        skytree.add(obs1);

        // 第二展望台
        const obs2 = new THREE.Mesh(new THREE.CylinderGeometry(4, 3, 3, 16), new THREE.MeshPhongMaterial({color: 0xffffff}));
        obs2.position.y = 95;
        skytree.add(obs2);

        // アンテナ
        const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 1, 30, 8), silver);
        ant.position.y = 130;
        skytree.add(ant);

        scene.add(skytree);

        // --- 4. 空港セクション (北側) ---
        const airport = new THREE.Group();
        // 滑走路 (Runway)
        const runway = new THREE.Mesh(new THREE.PlaneGeometry(60, 400), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        runway.rotation.x = -Math.PI / 2;
        airport.add(runway);

        // 滑走路マーキング
        const white = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for(let i=0; i<10; i++) {
            const stripe = new THREE.Mesh(new THREE.PlaneGeometry(2, 20), white);
            stripe.rotation.x = -Math.PI / 2;
            stripe.position.set(0, 0.1, -180 + i * 40);
            airport.add(stripe);
        }
        // 入口のゼブラ (Threshold)
        for(let i=0; i<8; i++) {
            const zebra = new THREE.Mesh(new THREE.PlaneGeometry(1, 15), white);
            zebra.rotation.x = -Math.PI / 2;
            zebra.position.set(-15 + i * 4, 0.1, 190);
            airport.add(zebra);
        }

        airport.position.set(0, 0.06, -350);
        scene.add(airport);

        // --- 5. 高級邸宅 (My House) - 空港横の海沿い ---
        const mansion = new THREE.Group();
        const wallMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const glassMat = new THREE.MeshPhongMaterial({ color: 0xadd8e6, transparent: true, opacity: 0.4 });

        // 床と屋根
        const mFloor = new THREE.Mesh(new THREE.BoxGeometry(30, 0.5, 30), wallMat);
        const mRoof = new THREE.Mesh(new THREE.BoxGeometry(30, 0.5, 30), wallMat);
        mRoof.position.y = 10;
        mansion.add(mFloor, mRoof);

        // 壁（一部ガラスにして中が見えるように）
        const backWall = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 0.5), wallMat);
        backWall.position.set(0, 5, -15);
        const glassFront = new THREE.Mesh(new THREE.BoxGeometry(30, 10, 0.1), glassMat);
        glassFront.position.set(0, 5, 15);
        mansion.add(backWall, glassFront);

        // 内部：赤いカーペット
        const carpet = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshBasicMaterial({ color: 0xaa0000 }));
        carpet.rotation.x = -Math.PI / 2;
        carpet.position.y = 0.3;
        mansion.add(carpet);

        // プール
        const pool = new THREE.Mesh(new THREE.PlaneGeometry(15, 25), new THREE.MeshPhongMaterial({ color: 0x00ffff }));
        pool.rotation.x = -Math.PI / 2;
        pool.position.set(25, 0.1, 0);
        mansion.add(pool);

        mansion.position.set(100, 0, -300);
        scene.add(mansion);

        // --- 6. 既存ビル群の自動生成 ---
        const bCount = 40;
        for (let i = 0; i < bCount; i++) {
            const h = Math.random() * 20 + 10;
            const b = new THREE.Mesh(new THREE.BoxGeometry(8, h, 8), new THREE.MeshPhongMaterial({ color: 0xffffff }));
            let x, z;
            do {
                x = (Math.random() - 0.5) * 250;
                z = (Math.random() - 0.5) * 250;
            } while (Math.sqrt(x*x + z*z) < 40); 
            b.position.set(x, h/2, z);
            scene.add(b);
        }

        // --- 7. 操作系 ---
        let joystickActive = false;
        let leftStart = { x: 0, y: 0 };
        let moveDir = { x: 0, z: 0 };

        window.addEventListener('touchstart', e => {
            const t = e.touches[0];
            if(t.clientX < window.innerWidth / 2) {
                joystickActive = true;
                leftStart = { x: t.clientX, y: t.clientY };
                document.getElementById('joystick-base').style.display = 'block';
                document.getElementById('joystick-base').style.left = leftStart.x + 'px';
                document.getElementById('joystick-base').style.top = leftStart.y + 'px';
            }
        });

        window.addEventListener('touchmove', e => {
            for(let t of e.touches) {
                if(t.clientX < window.innerWidth / 2 && joystickActive) {
                    const dx = t.clientX - leftStart.x;
                    const dy = t.clientY - leftStart.y;
                    const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                    const ang = Math.atan2(dy, dx);
                    document.getElementById('joystick-stick').style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                    moveDir = { x: Math.cos(ang) * (dist/40), z: Math.sin(ang) * (dist/40) };
                } else {
                    // 右側視点変更
                    const movementX = t.clientX - (window.lastX || t.clientX);
                    const movementY = t.clientY - (window.lastY || t.clientY);
                    cameraRot.y -= movementX * 0.005;
                    cameraRot.x -= movementY * 0.005;
                    window.lastX = t.clientX; window.lastY = t.clientY;
                }
            }
        });

        window.addEventListener('touchend', () => { 
            joystickActive = false; 
            document.getElementById('joystick-base').style.display = 'none';
            moveDir = { x: 0, z: 0 };
            window.lastX = null; window.lastY = null;
        });

        // アニメーションループ
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            camera.quaternion.setFromEuler(new THREE.Euler(cameraRot.x, cameraRot.y, 0, 'YXZ'));
            
            // 移動
            const speed = 30.0;
            const forward = new THREE.Vector3(moveDir.x, 0, moveDir.z);
            forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), cameraRot.y);
            camera.position.add(forward.multiplyScalar(speed * dt));
            camera.position.y = 2.5;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
