<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Empire v3.0 - Grand Expansion</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #cae5f5; font-family: sans-serif; touch-action: none; -webkit-user-select: none; user-select: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #1a202c; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); pointer-events: none; z-index: 100; border-left: 5px solid #4a5568; }
        h1 { margin: 0; font-size: 18px; }
        #joystick-base { position: absolute; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.1); border: 2px solid rgba(0, 0, 0, 0.2); border-radius: 50%; display: none; transform: translate(-50%, -50%); pointer-events: none; z-index: 1000; }
        #joystick-stick { position: absolute; width: 50px; height: 50px; background: #fff; border-radius: 50%; top: 25px; left: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>帝国 v3.0 拡張計画</h1>
        <p style="font-size:12px;">中央：スカイツリー / 北側：国際空港 / 海沿い：高級邸宅<br>左スワイプ：移動 / 右スワイプ：視点変更</p>
    </div>

    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script src="app.js"></script>
</body>
</html>
